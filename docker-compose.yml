x-spark-common: &spark-common
  image: apache/spark:3.5.1
  volumes:
    - ./jobs:/opt/spark/work-dir/jobs
    - ./spark-logs:/opt/spark/logs
  environment:
    PYSPARK_PYTHON: python3.8
    PYSPARK_DRIVER_PYTHON: python3.8
  networks:
    - code-labuk

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    PYSPARK_PYTHON: python3.8
    PYSPARK_DRIVER_PYTHON: python3.8
  env_file:
    - airflow.env
  volumes:
    - ./jobs:/opt/airflow/jobs
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./spark-logs:/opt/spark/logs
#  depends_on:
#    - postgres
  networks:
    - code-labuk



services:
  spark-master:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "9090:8080"
      - "7077:7077"

  spark-worker:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 1g

  spark-history:
    <<: *spark-common
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"
    volumes:
      - ./spark-logs:/opt/spark/logs
    environment:
      PYSPARK_PYTHON: python3.8
      PYSPARK_DRIVER_PYTHON: python3.8
      SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=file:/opt/spark/logs"

  postgres:
    image: postgres:14.0
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    networks:
      - code-labuk
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5


  scheduler:
    <<: *airflow-common
    command: bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --firstname Afzal
      --lastname Ahmed
      --email codelabuk@gmail.com
      --password admin
      --role Admin &&
     airflow scheduler"
    depends_on:
      postgres:
        condition: service_healthy

  webserver:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow webserver"
    ports:
      - "8080:8080"
      - "4040:4040"
    depends_on:
#      scheduler:
#        condition: service_started
      postgres:
        condition: service_healthy



networks:
  code-labuk: